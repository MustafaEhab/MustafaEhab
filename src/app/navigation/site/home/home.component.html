<div class="position-relative">
    <div class="w-100 h-100 p-0 m-0 position-relative d-flex carousel-holder">
        <mdb-carousel class=" carousel slide " [animation]="'slide'" [interval]="7000" [noPause]="true">
            <mdb-carousel-item>
                <div class="view w-100">
                    <img class="d-block w-100" src="../../../../assets/imgs/theme-new-logo.png" alt="Third slide">
                    <div class="mask rgba-black-slight waves-light" mdbWavesEffect></div>
                </div>
            </mdb-carousel-item>
            <mdb-carousel-item>
                <div class="view w-100">
                    <img class="d-block w-100" src="../../../../assets/imgs/hurgarda.jpg" alt="Third slide">
                    <div class="mask rgba-black-slight waves-light" mdbWavesEffect></div>
                </div>
                <div class="carousel-caption">
                    <div
                        class="mx-auto my-auto venue-main-holder text-center py-3 animate__animated animate__slideInDown">
                        <h1 class="time-header">
                            4<small class="symbol">th</small> IAAH MENA REGION
                            <br>
                            <small><small>
                                    ADOLESCENT HEALTH CONFERENCE
                                </small>
                            </small>
                        </h1>
                        <h2 class="con-name h2-responsive">
                            Adolescent care, Leaving no one behind
                        </h2>
                        <h4 class="venue">
                            <span class="position-relative ml-3">
                                {{ conferenceDate | date}}
                            </span>
                            <span class="position-relative ml-3">
                                Hurghada, Red Sea
                            </span>
                            <Span class="position-relative ml-3">
                                Egypt
                            </Span>
                        </h4>
                    </div>
                </div>
            </mdb-carousel-item>
            <mdb-carousel-item>
                <div class="view w-100">
                    <img class="d-block w-100" src="../../../../assets/imgs/chairs.png" alt="Third slide">
                    <div class="mask rgba-black-slight waves-light" mdbWavesEffect></div>
                </div>
                <div class="carousel-caption">
                    <div
                        class="mx-auto my-auto timer-main-holder text-center pt-3 pb-1 animate__animated animate__slideInDown">
                        <h1 class="time-header-two">
                            Adolescent care, Leaving no one behind
                        </h1>
                        <h2 class="con-name-two h2-responsive">
                            4<small class="symbol">th</small> IAAH MENA REGION
                            <br>
                            <small><small>
                                    ADOLESCENT HEALTH CONFERENCE
                                </small>
                            </small>
                        </h2>
                        <p class="start-in">
                            Strats In :
                        </p>
                        <h1 class="pb-0 mb-0 timer">
                            <span class="d-inline-block ">
                                <span class="d-block py-0 my-0 pl-3">
                                    <span id="days"></span>
                                    <span class="time-divider">:</span>
                                </span>
                                <small class="d-block my-0">Days</small>
                            </span>
                            <span class="d-inline-block ">
                                <span class="d-block py-0 my-0 pl-3">
                                    <span id="hours"></span>
                                    <span class="time-divider">:</span>
                                </span>

                                <small class="d-block my-0">Hours</small>
                            </span>
                            <span class="d-inline-block ">
                                <span class="d-block py-0 my-0 pl-3">
                                    <span id="mins"></span>
                                </span>
                                <small class="d-block  my-0">Minutes</small>
                            </span>
                        </h1>
                        <h2>
                            <span id="end" class=" pb-0 mb-0 timer"></span>
                        </h2>
                    </div>
                </div>
            </mdb-carousel-item>
        </mdb-carousel>
    </div>

</div>
